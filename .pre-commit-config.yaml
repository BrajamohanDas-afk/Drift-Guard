repos:
# ruff — checks for code style issues and bad patterns
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.0
    hooks:
      - id: ruff
        args: [--fix]
# mypy — checks for type errors
  - repo: https://github.com/psf/black
    rev: 24.4.2
    hooks:
      - id: black
# black — auto-formats your code so it's consistent
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.0
    hooks:
      - id: mypy
        exclude: ^alembic/